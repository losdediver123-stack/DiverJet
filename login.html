<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar — DiverJet</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body class="auth">

<nav>
  <a href="index.html" class="logo">Diver<b>Jet</b></a>
  <div class="nav-centro">
    <a href="index.html">Inicio</a>
    <a href="ofertas.html">Ofertas</a>
    <a href="consejos.html">Consejos</a>
  </div>
  <a href="login.html" class="nav-btn">Mi cuenta</a>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="tit-form">Bienvenido de vuelta.</div>
    <div class="sub-form">Entra para ver tus viajes y gestionar tu cuenta.</div>

    <form action="perfil.html">
      <div class="campo">
        <label>Correo electrónico</label>
        <input type="email" placeholder="tu@correo.com" required>
      </div>
      <div class="campo">
        <label>Contraseña</label>
        <input type="password" placeholder="••••••••" required>
      </div>
      <a href="#" class="forgot">¿Olvidaste la contraseña?</a>
      <button type="submit" class="btn btn-negro btn-w">Entrar →</button>
    </form>

    <div class="divider"></div>
    <div class="pie-form">¿Sin cuenta? <a href="registro.html">Regístrate gratis</a></div>
  </div>
</div>

<div class="pie">
  <a href="index.html" class="pie-logo">Diver<b>Jet</b></a>
  <span>© 2024 · hola@diverjet.com</span>
  <ul class="pie-links">
    <li><a href="#">Aviso legal</a></li>
    <li><a href="#">Privacidad</a></li>
  </ul>
</div>

</body>
</html>
